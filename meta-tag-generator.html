  </script>
  <style>

    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
    .field { width: 100%; border-radius: 1rem; border: 1px solid rgb(229 231 235); background: rgb(248 250 252); padding: .75rem 1rem; color: rgb(15 23 42); outline: none; transition: border-color .2s, box-shadow .2s; }
    .field:focus { border-color: rgb(34 211 238); box-shadow: 0 0 0 4px rgba(34,211,238,.12); }
    .dark .field { border-color: rgba(255,255,255,.1); background: rgba(2,6,23,.72); color: rgb(241 245 249); }
    .action { display: inline-flex; min-height: 2.75rem; max-width: 100%; align-items: center; justify-content: center; border-radius: 999px; padding: .75rem 1.25rem; font-size: .875rem; font-weight: 800; text-align: center; white-space: normal; overflow-wrap: anywhere; transition: transform .12s, background .2s, border-color .2s; }
    .action:active { transform: scale(.97); }
    .primary { background: rgb(34 211 238); color: rgb(2 6 23); }
    .primary:hover { background: rgb(103 232 249); }
    .secondary { border: 1px solid rgb(229 231 235); background: white; color: rgb(30 41 59); }
    .secondary:hover { border-color: rgba(34,211,238,.65); background: rgb(236 254 255); }

<body class="min-h-screen bg-white text-slate-900 antialiased dark:bg-[#030712] dark:text-slate-100">

  <header class="mx-auto max-w-6xl px-4 pt-4 sm:px-6 sm:pt-6 lg:px-8">
    <nav class="flex flex-col gap-3 rounded-3xl border border-gray-200 bg-white/90 p-3 shadow-sm backdrop-blur-md dark:border-white/10 dark:bg-white/[0.04] sm:p-4 lg:flex-row lg:items-center lg:justify-between">
      <a href="./" class="flex min-w-0 items-center gap-3 rounded-2xl focus:outline-none focus:ring-2 focus:ring-cyan-400/70" aria-label="Micro Tools Matrix">
        <img src="./assets/logo-web.png" alt="Micro Tools Matrix logo" width="40" height="40" class="h-10 w-10 shrink-0 rounded-2xl bg-white object-contain p-1 shadow-sm ring-1 ring-gray-200 dark:bg-white/[0.06] dark:ring-white/10">
        <span class="min-w-0"><span class="block truncate text-sm font-semibold tracking-tight text-slate-950 dark:text-white">Micro Tools Matrix</span><span class="block truncate text-xs text-slate-600 dark:text-slate-400">Head / SEO 本地审计</span></span>
      </a>

        <button id="themeToggleBtn" type="button" data-theme-toggle class="action secondary shrink-0" aria-label="主题"><span data-theme-sun>☀</span><span data-theme-moon>☾</span><span data-theme-label class="hidden sm:inline">系统</span></button>
        <button id="openSponsorBtn" type="button" class="action secondary shrink-0"><span aria-hidden="true">☕</span><span>赞赏</span></button>
        <div role="group" aria-label="语言" class="inline-flex min-h-11 shrink-0 items-center rounded-full border border-gray-200 bg-slate-50 p-1 shadow-sm dark:border-white/10 dark:bg-white/[0.04]">
          <a href="./meta-tag-generator.html" hreflang="zh-CN" class="inline-flex min-h-9 items-center rounded-full bg-cyan-400 px-3 text-sm font-semibold text-slate-950">中</a>
          <a href="./en/meta-tag-generator.html" hreflang="en" class="inline-flex min-h-9 items-center rounded-full px-3 text-sm font-semibold text-slate-600 transition hover:text-slate-950 dark:text-slate-400 dark:hover:text-white">EN</a>
        </div>
      </div>
    </nav>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-6 sm:px-6 sm:py-10 lg:px-8">
    <section class="mb-6 rounded-3xl border border-gray-200 bg-white p-5 shadow-sm dark:border-white/10 dark:bg-white/[0.04] sm:mb-8 sm:p-7">
      <p class="mb-3 text-xs font-semibold uppercase tracking-[0.2em] text-cyan-600 dark:text-cyan-300">浏览器本地 SEO 检查</p>
      <h1 class="max-w-4xl break-words text-2xl font-black tracking-tight text-slate-950 dark:text-white sm:text-4xl">HTML Head / SEO 标签审计器</h1>
      <p class="mt-4 max-w-3xl text-sm leading-7 text-slate-600 dark:text-slate-400 sm:text-base">粘贴现有 Head 或填入页面信息，检查标题、描述、canonical、OG/Twitter、图标、hreflang、结构化数据和外联风险，并生成可落地的推荐片段。</p>
    </section>

    <section class="grid gap-5 lg:grid-cols-[0.95fr_1.05fr]">
      <section class="min-w-0 rounded-3xl border border-gray-200 bg-white p-5 shadow-sm dark:border-white/10 dark:bg-white/[0.04] sm:p-6">
        <div class="mb-4 flex items-center justify-between gap-3">
          <h2 class="text-base font-bold text-slate-950 dark:text-white">输入与审计</h2>
          <span class="rounded-full border border-gray-200 bg-slate-50 px-2.5 py-1 text-[10px] font-semibold uppercase tracking-[0.18em] text-slate-500 dark:border-white/10 dark:bg-white/[0.04]">Local</span>
        </div>
        <label class="block min-w-0">
          <span class="mb-2 block text-sm font-semibold text-slate-700 dark:text-slate-300">现有 head 代码</span>
          <textarea id="headInput" rows="10" class="field resize-y font-mono text-xs leading-6 sm:text-sm" spellcheck="false" placeholder="粘贴 <head>...</head> 或内部 meta/link/title 片段"></textarea>
        </label>
        <div class="mt-4 grid gap-4 sm:grid-cols-2">
          <label class="block min-w-0"><span class="mb-2 block text-sm font-semibold text-slate-700 dark:text-slate-300">页面标题</span><input id="pageTitle" class="field" maxlength="120" placeholder="例如：Micro Tools Matrix"></label>
          <label class="block min-w-0"><span class="mb-2 block text-sm font-semibold text-slate-700 dark:text-slate-300">规范 URL</span><input id="canonicalUrl" class="field" placeholder="https://example.com/page"></label>
          <label class="block min-w-0 sm:col-span-2"><span class="mb-2 block text-sm font-semibold text-slate-700 dark:text-slate-300">页面描述</span><textarea id="pageDescription" rows="3" class="field resize-y" maxlength="320" placeholder="建议 80-160 字符，准确描述页面内容"></textarea></label>
          <label class="block min-w-0"><span class="mb-2 block text-sm font-semibold text-slate-700 dark:text-slate-300">预览图 URL</span><input id="imageUrl" class="field" placeholder="https://example.com/og.png"></label>
          <label class="block min-w-0"><span class="mb-2 block text-sm font-semibold text-slate-700 dark:text-slate-300">站点名</span><input id="siteName" class="field" placeholder="Micro Tools Matrix"></label>
        </div>
        <div class="mt-4 flex flex-col gap-3 sm:flex-row sm:flex-wrap">
          <button id="auditBtn" type="button" class="action primary">审计 Head</button>
          <button id="generateBtn" type="button" class="action secondary">生成推荐片段</button>
          <button id="sampleBtn" type="button" class="action secondary">示例</button>
          <button id="clearBtn" type="button" class="action secondary">清空</button>
        </div>
        <p id="statusText" class="mt-4 min-h-11 w-full max-w-full overflow-hidden break-words rounded-xl border border-cyan-200 bg-cyan-50 px-4 py-3 text-sm leading-6 text-cyan-800 dark:border-cyan-400/20 dark:bg-cyan-400/10 dark:text-cyan-200" role="status" aria-live="polite">所有检查均在浏览器本地完成。</p>
      </section>

      <section class="min-w-0 space-y-5">
        <section class="rounded-3xl border border-gray-200 bg-white p-5 shadow-sm dark:border-white/10 dark:bg-white/[0.04] sm:p-6">
          <div class="flex items-center gap-4">
            <div id="scoreRing" class="score-ring flex h-24 w-24 shrink-0 items-center justify-center rounded-full p-2" style="--score:0">
              <div class="flex h-full w-full items-center justify-center rounded-full bg-white text-2xl font-black text-slate-950 dark:bg-[#030712] dark:text-white"><span id="scoreText">0</span></div>
            </div>
            <div class="min-w-0">
              <h2 class="text-base font-bold text-slate-950 dark:text-white">审计结果</h2>
              <p id="summaryText" class="mt-2 text-sm leading-6 text-slate-600 dark:text-slate-400">等待输入。</p>
            </div>
          </div>
          <div id="issueList" class="mt-5 space-y-3"></div>
        </section>

        <section class="rounded-3xl border border-gray-200 bg-white p-5 shadow-sm dark:border-white/10 dark:bg-white/[0.04] sm:p-6">
          <div class="mb-4 flex items-center justify-between gap-3">
            <h2 class="text-base font-bold text-slate-950 dark:text-white">推荐 Head 片段</h2>
            <button id="copyBtn" type="button" class="action secondary">复制</button>
          </div>
          <textarea id="headOutput" rows="14" readonly class="field resize-y font-mono text-xs leading-6 sm:text-sm" spellcheck="false"></textarea>
        </section>
      </section>
    </section>
  </main>

  <footer class="mx-auto max-w-6xl px-4 pb-8 text-center text-xs leading-6 text-slate-500 dark:text-slate-500 sm:px-6 lg:px-8">Micro Tools Matrix - 浏览器本地处理，无需上传。</footer>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const $ = (id) => document.getElementById(id);
      const checks = [
        { key: "charset", label: "charset=UTF-8", test: (doc) => Boolean(doc.querySelector("meta[charset]")), weight: 8, fix: "添加 <meta charset=\"UTF-8\">。" },
        { key: "viewport", label: "viewport", test: (doc) => Boolean(doc.querySelector('meta[name="viewport"]')), weight: 8, fix: "添加移动端 viewport。" },
        { key: "title", label: "title 长度", test: (doc) => { const t = doc.querySelector("title")?.textContent.trim() || $("pageTitle").value.trim(); return t.length >= 10 && t.length <= 70; }, weight: 12, fix: "标题建议 10-70 字符。" },
        { key: "description", label: "description 长度", test: (doc) => { const d = doc.querySelector('meta[name="description"]')?.content.trim() || $("pageDescription").value.trim(); return d.length >= 50 && d.length <= 170; }, weight: 12, fix: "描述建议 50-170 字符。" },
        { key: "canonical", label: "canonical", test: (doc) => Boolean(doc.querySelector('link[rel="canonical"]') || $("canonicalUrl").value.trim()), weight: 10, fix: "添加规范 URL，避免重复页面权重分散。" },
        { key: "og", label: "Open Graph", test: (doc) => Boolean(doc.querySelector('meta[property="og:title"]') && doc.querySelector('meta[property="og:description"]')), weight: 10, fix: "补齐 og:title 与 og:description。" },
        { key: "twitter", label: "Twitter Card", test: (doc) => Boolean(doc.querySelector('meta[name="twitter:card"]')), weight: 8, fix: "添加 twitter:card，改善分享预览。" },
        { key: "icons", label: "站点图标", test: (doc) => Boolean(doc.querySelector('link[rel~="icon"]')), weight: 7, fix: "添加 favicon / apple-touch-icon。" },
        { key: "hreflang", label: "hreflang", test: (doc) => Boolean(doc.querySelector('link[rel="alternate"][hreflang]')), weight: 7, fix: "多语言页面建议添加 hreflang。" },
        { key: "jsonld", label: "JSON-LD", test: (doc) => Boolean(doc.querySelector('script[type="application/ld+json"]')), weight: 8, fix: "添加 SoftwareApplication、Article 或 WebPage 结构化数据。" },
        { key: "external", label: "外联风险", test: (doc) => !Array.from(doc.querySelectorAll("script[src],link[href]")).some((node) => /^https?:\/\//i.test(node.getAttribute("src") || node.getAttribute("href") || "")), weight: 10, fix: "本项目原则下不要在 head/body 引入外部 CDN 或追踪脚本。" }
      ];

      function setStatus(message, tone = "info") {
        const tones = {
          info: "border-cyan-200 bg-cyan-50 text-cyan-800 dark:border-cyan-400/20 dark:bg-cyan-400/10 dark:text-cyan-200",
          ok: "border-emerald-200 bg-emerald-50 text-emerald-800 dark:border-emerald-400/20 dark:bg-emerald-400/10 dark:text-emerald-200",
          warn: "border-amber-200 bg-amber-50 text-amber-900 dark:border-amber-400/20 dark:bg-amber-400/10 dark:text-amber-200",
          danger: "border-red-200 bg-red-50 text-red-800 dark:border-red-400/20 dark:bg-red-400/10 dark:text-red-200"
        };
        $("statusText").className = "mt-4 min-h-11 w-full max-w-full overflow-hidden break-words rounded-xl border px-4 py-3 text-sm leading-6 " + tones[tone];
        $("statusText").textContent = message;
      }

      function parseHead() {
        const raw = $("headInput").value.trim();
        const parser = new DOMParser();
        const wrapped = raw.includes("<head") ? raw : "<!doctype html><html><head>" + raw + "</head><body></body></html>";
        return parser.parseFromString(wrapped, "text/html");
      }

      function audit() {
        try {
          const doc = parseHead();
          let score = 0;
          const issueList = $("issueList");
          issueList.innerHTML = "";
          checks.forEach((check) => {
            const ok = check.test(doc);
            if (ok) score += check.weight;
            const item = document.createElement("div");
            item.className = "rounded-2xl border px-4 py-3 text-sm leading-6 " + (ok ? "border-emerald-200 bg-emerald-50 text-emerald-800 dark:border-emerald-400/20 dark:bg-emerald-400/10 dark:text-emerald-200" : "border-amber-200 bg-amber-50 text-amber-900 dark:border-amber-400/20 dark:bg-amber-400/10 dark:text-amber-200");
            item.textContent = (ok ? "通过：" : "待修复：") + check.label + (ok ? "" : " - " + check.fix);
            issueList.append(item);
          });
          $("scoreText").textContent = String(score);
          $("scoreRing").style.setProperty("--score", score);
          $("summaryText").textContent = score >= 85 ? "Head 基础质量良好。" : score >= 65 ? "可用，但还有关键 SEO 或分享项需要补齐。" : "建议优先修复缺失标签与外联风险。";
          setStatus("审计完成。", score >= 85 ? "ok" : "warn");
          return score;
        } catch (error) {
          setStatus("解析失败，请检查 Head 片段是否完整。", "danger");
          alert("解析失败，请检查 Head 片段是否完整。");
          return 0;
        }
      }

      function esc(value) {
        return String(value || "").replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }

      function generate() {
        const title = $("pageTitle").value.trim() || "Page Title";
        const description = $("pageDescription").value.trim() || "Page description for search engines and social previews.";
        const canonical = $("canonicalUrl").value.trim() || "https://example.com/";
        const image = $("imageUrl").value.trim() || "/assets/images/og-banner.png";
        const site = $("siteName").value.trim() || "Site Name";
        const lines = [
          '<meta charset="UTF-8">',
          '<meta name="viewport" content="width=device-width, initial-scale=1.0">',
          "<title>" + esc(title) + "</title>",
          '<meta name="description" content="' + esc(description) + '">',
          '<link rel="canonical" href="' + esc(canonical) + '">',
          '<meta property="og:type" content="website">',
          '<meta property="og:title" content="' + esc(title) + '">',
          '<meta property="og:description" content="' + esc(description) + '">',
          '<meta property="og:url" content="' + esc(canonical) + '">',
          '<meta property="og:image" content="' + esc(image) + '">',
          '<meta property="og:site_name" content="' + esc(site) + '">',
          '<meta name="twitter:card" content="summary_large_image">',
          '<meta name="twitter:title" content="' + esc(title) + '">',
          '<meta name="twitter:description" content="' + esc(description) + '">',
          '<meta name="twitter:image" content="' + esc(image) + '">',
          '<link rel="icon" href="/favicon.svg" type="image/svg+xml">',
          '<link rel="apple-touch-icon" href="/apple-touch-icon.png">'
        ];
        $("headOutput").value = lines.join("\n");
        setStatus("推荐 Head 片段已生成。", "ok");
      }

      $("auditBtn").addEventListener("click", audit);
      $("generateBtn").addEventListener("click", () => { generate(); audit(); });
      $("sampleBtn").addEventListener("click", () => {
        $("pageTitle").value = "Micro Tools Matrix - 本地开发者工具";
        $("pageDescription").value = "Micro Tools Matrix 提供浏览器本地运行的开发者、硬件调试和数据处理工具，无需上传，适合断网环境使用。";
        $("canonicalUrl").value = "https://mymicrotools.xyz/";
        $("imageUrl").value = "https://mymicrotools.xyz/assets/images/og-banner.png";
        $("siteName").value = "Micro Tools Matrix";
        $("headInput").value = '<title>Micro Tools Matrix</title>\n<meta name="description" content="Local tools">';
        generate();
        audit();
      });
      $("clearBtn").addEventListener("click", () => {
        ["headInput", "pageTitle", "pageDescription", "canonicalUrl", "imageUrl", "siteName", "headOutput"].forEach((id) => { $(id).value = ""; });
        $("issueList").innerHTML = "";
        $("scoreText").textContent = "0";
        $("scoreRing").style.setProperty("--score", 0);
        $("summaryText").textContent = "等待输入。";
        setStatus("已清空。");
      });
      $("copyBtn").addEventListener("click", async () => {
        if (!$("headOutput").value.trim()) generate();
        try {
          await navigator.clipboard.writeText($("headOutput").value);
          setStatus("推荐片段已复制。", "ok");
        } catch {
          setStatus("复制失败，请手动选择文本复制。", "warn");
        }
      });
    });
  </script>
  <script src="./sponsor.js" defer></script>
  <script src="./theme-toggle.js" defer></script>
</body>
