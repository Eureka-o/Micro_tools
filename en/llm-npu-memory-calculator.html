    let currentLanguage = document.documentElement.lang.toLowerCase().startsWith("en") ? "en" : "zh";
    function t(key) { return (I18N[currentLanguage] && I18N[currentLanguage][key]) || I18N.en[key] || I18N.zh[key] || ""; }
    function setText(selector, value) { const el = document.querySelector(selector); if (el) el.textContent = value; }
    function applyLanguage(lang) {
      currentLanguage = lang === "en" ? "en" : "zh";
      document.documentElement.lang = currentLanguage === "en" ? "en" : "zh-CN";
      document.querySelectorAll("[data-i18n]").forEach((el) => { el.textContent = t(el.dataset.i18n); });
      document.querySelectorAll("[data-i18n-placeholder]").forEach((el) => { el.setAttribute("placeholder", t(el.dataset.i18nPlaceholder)); });
      document.querySelectorAll("[data-i18n-aria-label]").forEach((el) => { el.setAttribute("aria-label", t(el.dataset.i18nAriaLabel)); });
      document.querySelectorAll("[data-i18n-title]").forEach((el) => { el.setAttribute("title", t(el.dataset.i18nTitle)); });
      document.title = t("documentTitle");
      const metaDescription = document.querySelector('meta[name="description"]');
      if (metaDescription) metaDescription.setAttribute("content", t("metaDescription"));
      const metaKeywords = document.querySelector('meta[name="keywords"]');
      if (metaKeywords) metaKeywords.setAttribute("content", t("metaKeywords"));
      document.getElementById("langZhBtn")?.classList.toggle("bg-cyan-400", currentLanguage === "zh");
      document.getElementById("langZhBtn")?.classList.toggle("text-slate-950", currentLanguage === "zh");
      document.getElementById("langEnBtn")?.classList.toggle("bg-cyan-400", currentLanguage === "en");
      document.getElementById("langEnBtn")?.classList.toggle("text-slate-950", currentLanguage === "en");
      if (window.microToolsTheme && typeof window.microToolsTheme.refresh === "function") window.microToolsTheme.refresh();
      if (typeof updateTool === "function") updateTool();
    }
    function setStatus(keyOrText, isError = false) {
      const status = document.getElementById("statusText");
      if (!status) return;
      const value = I18N[currentLanguage]?.[keyOrText] ? t(keyOrText) : keyOrText;
      status.textContent = value;
      status.className = "mt-4 min-h-6 text-sm leading-6 " + (isError ? "text-rose-600 dark:text-rose-300" : "text-slate-500 dark:text-slate-400");
    }
    async function copyText(value) {
      try {
        await navigator.clipboard.writeText(value || "");
        setStatus("copiedStatus");
      } catch (error) {
        setStatus("copyFailedStatus", true);
      }
    }
    document.getElementById("langZhBtn")?.addEventListener("click", () => applyLanguage("zh"));
    document.getElementById("langEnBtn")?.addEventListener("click", () => applyLanguage("en"));

    const fields = ["paramB", "batchSize", "seqLength", "layers", "hiddenSize", "precision"].map((id) => document.getElementById(id));
    const resultOutput = document.getElementById("resultOutput");
    function numberValue(id, fallback) {
      const value = Number(document.getElementById(id).value);
      return Number.isFinite(value) && value > 0 ? value : fallback;
    }
    function bytesToHuman(bytes) {
      const gb = bytes / (1024 ** 3);
      const mb = bytes / (1024 ** 2);
      if (gb >= 1) return `${gb.toFixed(2)} GB`;
      return `${mb.toFixed(2)} MB`;
    }
    function flopsHuman(flops) {
      if (flops >= 1e15) return `${(flops / 1e15).toFixed(2)} PFLOPs`;
      if (flops >= 1e12) return `${(flops / 1e12).toFixed(2)} TFLOPs`;
      if (flops >= 1e9) return `${(flops / 1e9).toFixed(2)} GFLOPs`;
      return `${flops.toFixed(0)} FLOPs`;
    }
    function updateTool() {
      const paramsB = numberValue("paramB", 7);
      const params = paramsB * 1e9;
      const batch = numberValue("batchSize", 1);
      const seq = numberValue("seqLength", 4096);
      const layers = numberValue("layers", 32);
      const hidden = numberValue("hiddenSize", 4096);
      const bytes = Number(document.getElementById("precision").value);
      const tokens = batch * seq;
      const weightBytes = params * bytes;
      const kvBytes = batch * seq * layers * hidden * 2 * bytes;
      const totalBytes = weightBytes + kvBytes;
      const flops = 2 * params * tokens;
      document.getElementById("weightsOut").textContent = bytesToHuman(weightBytes);
      document.getElementById("kvOut").textContent = bytesToHuman(kvBytes);
      document.getElementById("totalOut").textContent = bytesToHuman(totalBytes);
      document.getElementById("flopsOut").textContent = flopsHuman(flops);
      document.getElementById("tokensOut").textContent = `${tokens.toLocaleString()} tokens`;
      document.getElementById("bytesOut").textContent = `${bytes} B`;
      const formula = [
        `Parameters: ${paramsB}B = ${params.toLocaleString()} params`,
        `Weight memory: ${params.toLocaleString()} × ${bytes} B = ${bytesToHuman(weightBytes)}`,
        `KV Cache: ${batch} × ${seq} × ${layers} × ${hidden} × 2 × ${bytes} B = ${bytesToHuman(kvBytes)}`,
        `Total: ${bytesToHuman(weightBytes)} + ${bytesToHuman(kvBytes)} = ${bytesToHuman(totalBytes)}`,
        `Prefill compute: 2 × ${params.toLocaleString()} × ${tokens.toLocaleString()} = ${flopsHuman(flops)}`
      ].join("\n");
      document.getElementById("formulaOut").textContent = formula;
      resultOutput.value = formula;
      setStatus("estimatedStatus");
    }
    fields.forEach((field) => field.addEventListener("input", updateTool));
    fields.forEach((field) => field.addEventListener("change", updateTool));
    document.getElementById("sampleBtn").addEventListener("click", () => {
      document.getElementById("paramB").value = "7";
      document.getElementById("batchSize").value = "1";
      document.getElementById("seqLength").value = "4096";
      document.getElementById("layers").value = "32";
      document.getElementById("hiddenSize").value = "4096";
      document.getElementById("precision").value = "2";
      updateTool();
      setStatus("sampleStatus");
    });
    document.getElementById("copyBtn").addEventListener("click", () => copyText(resultOutput.value));
    updateTool();

    document.addEventListener("DOMContentLoaded", () => applyLanguage(currentLanguage));
  </script>
  <script>
    function getShareMessage(key) {
      const lang = typeof currentLanguage === "string" ? currentLanguage : (document.documentElement.lang === "en" ? "en" : "zh");
      const fallback = {
        zh: {
          shareCopied: "分享链接已复制到剪贴板！",
          shareCopyPrompt: "复制此分享链接：",
          shareCopyFailed: "复制失败，请手动复制地址栏链接。",
          shareDataTooLarge: "当前数据过大，无法生成分享链接，请直接复制文本结果。"
        },
        en: {
          shareCopied: "Share link copied to clipboard!",
          shareCopyPrompt: "Copy this share link:",
          shareCopyFailed: "Copy failed. Please copy the address bar link manually.",
          shareDataTooLarge: "The current data is too large to create a share link. Please copy the text result directly."
        }
      };
      const dict = typeof I18N === "object" && I18N[lang] ? I18N[lang] : fallback.zh;
      return dict[key] || fallback[lang]?.[key] || fallback.zh[key] || "";
    }

    function closeShareMenu() {
      const menu = document.getElementById("shareToolMenu");
      const trigger = document.getElementById("shareToolBtn");
      if (!menu || !trigger) return;
      menu.classList.add("hidden");
      trigger.setAttribute("aria-expanded", "false");
    }

    function openShareMenu() {
      const menu = document.getElementById("shareToolMenu");
      const trigger = document.getElementById("shareToolBtn");
      if (!menu || !trigger) return;
      menu.classList.remove("hidden");
      trigger.setAttribute("aria-expanded", "true");
    }

    function toggleShareMenu(event) {
      if (event) event.stopPropagation();
      const menu = document.getElementById("shareToolMenu");
      if (!menu) return;
      if (menu.classList.contains("hidden")) {
        openShareMenu();
      } else {
        closeShareMenu();
      }
    }

    function closeShareMenuOnOutsideClick(event) {
      const root = document.getElementById("shareToolMenuRoot");
      if (root && !root.contains(event.target)) closeShareMenu();
    }

    function getCleanShareUrl() {
      return window.location.href.split("?")[0];
    }

    function encodeShareText(data) {
      return encodeURIComponent(btoa(unescape(encodeURIComponent(data))));
    }

    function decodeShareText(encodedData) {
      return decodeURIComponent(escape(atob(decodeURIComponent(encodedData))));
    }

    function getShareableControls() {
      return Array.from(document.querySelectorAll("main textarea[id], main input[id], main select[id], main [contenteditable='true'][id]")).filter((control) => {
        const type = (control.getAttribute("type") || control.tagName).toLowerCase();
        return !control.disabled && !["button", "submit", "reset", "file", "hidden", "image", "password"].includes(type);
      });
    }

    function serializeShareControl(control) {
      const tag = control.tagName.toLowerCase();
      const type = (control.getAttribute("type") || tag).toLowerCase();
      const field = { id: control.id, type };
      if (type === "checkbox" || type === "radio") {
        field.checked = Boolean(control.checked);
      } else if (control.isContentEditable) {
        field.value = control.textContent || "";
      } else {
        field.value = control.value || "";
      }
      return field;
    }

    function collectShareState() {
      const fields = getShareableControls().map(serializeShareControl).filter((field) => {
        if (field.type === "checkbox" || field.type === "radio") return field.checked;
        return String(field.value || "").length > 0;
      });
      return { version: 1, fields };
    }

    function shareUrl(url) {
      const shareData = {
        title: document.title,
        url
      };
      if (navigator.share) {
        navigator.share(shareData)
          .then(() => console.log("分享成功"))
          .catch((error) => console.log("分享失败", error));
        return;
      }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url)
          .then(() => {
            alert(getShareMessage("shareCopied"));
          })
          .catch((err) => {
            console.error("复制失败: ", err);
            window.prompt(getShareMessage("shareCopyPrompt"), url);
          });
        return;
      }
      window.prompt(getShareMessage("shareCopyPrompt"), url);
    }

    function shareToolOnly() {
      closeShareMenu();
      const cleanUrl = window.location.href.split("?")[0];
      shareUrl(cleanUrl);
    }

    function shareWithData() {
      closeShareMenu();
      const state = collectShareState();
      if (!state.fields.length) {
        shareUrl(getCleanShareUrl());
        return;
      }
      const rawData = JSON.stringify(state);
      if (rawData.length > 2000) {
        alert(getShareMessage("shareDataTooLarge"));
        return;
      }
      const encodedData = encodeShareText(rawData);
      const stateUrl = window.location.href.split("?")[0] + "?d=" + encodedData;
      shareUrl(stateUrl);
    }

    function applySharedField(field) {
      if (!field || !field.id) return;
      const control = document.getElementById(field.id);
      if (!control) return;
      const type = (control.getAttribute("type") || control.tagName).toLowerCase();
      if (type === "checkbox" || type === "radio") {
        control.checked = Boolean(field.checked);
      } else if (control.isContentEditable) {
        control.textContent = field.value || "";
      } else if (Object.prototype.hasOwnProperty.call(field, "value")) {
        control.value = field.value || "";
      }
      control.dispatchEvent(new Event("input", { bubbles: true }));
      control.dispatchEvent(new Event("change", { bubbles: true }));
    }

    function restoreShareStateFromUrl() {
      const encodedData = new URLSearchParams(window.location.search).get("d");
      if (!encodedData) return;
      try {
        const state = JSON.parse(decodeShareText(encodedData));
        if (!state || !Array.isArray(state.fields)) return;
        state.fields.forEach(applySharedField);
      } catch (error) {
        console.warn("Failed to restore shared state", error);
      }
    }

    function initializeShareMenu() {
      document.addEventListener("click", closeShareMenuOnOutsideClick);
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeShareMenu();
      });
      restoreShareStateFromUrl();
    }

    function shareTool() {
      toggleShareMenu();
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", initializeShareMenu);
    } else {
      initializeShareMenu();
    }
  </script>
